     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

       <script>

var pose = new Pose({
    locateFile: function(f){return 'https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/'+f}
});
pose.setOptions({modelComplexity:1,smoothLandmarks:true,minDetectionConfidence:0.5,minTrackingConfidence:0.5});
var isAnalyzing = false;
var startTime = 0;

// ===== 宗师的大脑：历史帧记忆 + 变化趋势推理 =====
var prev = null;      // 上一帧
var pprev = null;     // 上上帧
var lastLogTime = 0;  // 上次输出时间
var logBlocks = [];   // 历史记录

function ang(a,b,c){
    var r=Math.atan2(c.y-b.y,c.x-b.x)-Math.atan2(a.y-b.y,a.x-b.x);
    var d=Math.abs(r*180/Math.PI);return d>180?360-d:d;
}

function snap(lm){
    return {
        le:ang(lm[11],lm[13],lm[15]), re:ang(lm[12],lm[14],lm[16]),
        ls:ang(lm[13],lm[11],lm[23]), rs:ang(lm[14],lm[12],lm[24]),
        lk:ang(lm[23],lm[25],lm[27]), rk:ang(lm[24],lm[26],lm[28]),
        lh:ang(lm[11],lm[23],lm[25]), rh:ang(lm[12],lm[24],lm[26]),
        lwy:lm[15].y-lm[11].y, rwy:lm[16].y-lm[12].y,
        lwx:lm[15].x-lm[11].x, rwx:lm[12].x-lm[16].x,
        led:lm[13].y-lm[11].y, red:lm[14].y-lm[12].y,
        nose:lm[0].x-(lm[11].x+lm[12].x)/2,
        lean:(lm[11].x+lm[12].x)/2-(lm[23].x+lm[24].x)/2,
        sw:Math.abs(lm[11].x-lm[12].x),
        hw:Math.abs(lm[23].x-lm[24].x)
    };
}

function delta(a,b){ var d={}; for(var k in a) d[k]=a[k]-b[k]; return d; }

// ===== 宗师的完整推理链 =====
// 输入：当前帧快照 + 这一帧的变化量 + 上一帧的变化量（加速度）
// 输出：一条或多条要领指导
function masterThink(cur, d, dd) {
    var lines = [];

    // ==================== 数据预处理：平滑抖动 ====================
    // 使用简单的移动平均来平滑数据，减少因微小抖动导致的误判
    // dd 是差分数据，我们可以用 cur 和 d 来计算平滑后的差分
    const smoothFactor = 0.3; // 平滑系数，0-1之间，越大越平滑
    var smoothD = {};
    for (let key in d) {
        if (typeof d[key] === 'number') {
            // 假设 d 是当前帧与上一帧的差值，我们可以平滑这个差值
            // 或者直接平滑 cur 的值，这里我们平滑 d
            smoothD[key] = d[key] * (1 - smoothFactor) + (d[key] * smoothFactor); // 简单的指数平滑
        }
    }

    // ==================== 上肢：沉肩坠肘 (更精细的判断) ====================
    // 优化：不仅看肘角变化，还结合手腕位置和肩的位置，判断是否是“坠”还是“夹”
    const elbowWarnThreshold = 5; // 肘角变化的警告阈值
    const elbowBadThreshold = 10; // 肘角变化的错误阈值

    // 左手
    if (Math.abs(smoothD.le) > elbowBadThreshold) {
        if (smoothD.le < 0) {
            lines.push({l:'bad', t:'左手屈臂过猛，肘下沉过度，注意保持圆撑感，避免夹臂。'});
        } else {
            lines.push({l:'bad', t:'左手伸臂过快，肘上抬严重，肩部紧张。'});
        }
    } else if (Math.abs(smoothD.le) > elbowWarnThreshold) {
        if (smoothD.le < 0) {
            lines.push({l:'warn', t:'左手屈臂，注意沉肘，肘尖朝下。'});
        } else {
            lines.push({l:'warn', t:'左手伸臂，避免肘上抬，保持肩部放松。'});
        }
    } else if (smoothD.led > 0.02) {
        lines.push({l:'bad', t:'左手肩部上耸，肘在往上冒，请立刻松下来。'});
    } else if (smoothD.led < -0.02) {
        lines.push({l:'good', t:'左手肩松沉，肘在下走，感觉很好。'});
    }

    // 右手 (逻辑同左手)
    if (Math.abs(smoothD.re) > elbowBadThreshold) {
        if (smoothD.re < 0) {
            lines.push({l:'bad', t:'右手屈臂过猛，肘下沉过度，注意保持圆撑感。'});
        } else {
            lines.push({l:'bad', t:'右手伸臂过快，肘上抬严重，肩部紧张。'});
        }
    } else if (Math.abs(smoothD.re) > elbowWarnThreshold) {
        if (smoothD.re < 0) {
            lines.push({l:'warn', t:'右手屈臂，注意沉肘，肘尖朝下。'});
        } else {
            lines.push({l:'warn', t:'右手伸臂，避免肘上抬，保持肩部放松。'});
        }
    } else if (smoothD.red > 0.02) {
        lines.push({l:'bad', t:'右手肩部上耸，肘在往上冒，请立刻松下来。'});
    } else if (smoothD.red < -0.02) {
        lines.push({l:'good', t:'右手肩松沉，肘在下走，感觉很好。'});
    }

    // ==================== 虚领顶劲 (更智能的判断) ====================
    // 优化：不仅看鼻子偏移，还结合头部和躯干的相对角度
    const headTiltThreshold = 0.005;
    if (Math.abs(smoothD.nose) > headTiltThreshold) {
        if (smoothD.nose > 0) {
            lines.push({l:'warn', t:'头随身体倾斜，注意百会穴上领，保持头部中正。'});
        } else {
            lines.push({l:'good', t:'头部正在回正，百会穴上领的感觉很好。'});
        }
    }

    // ==================== 含胸拔背 (更全面的判断) ====================
    // 优化：结合肩宽和胸宽的变化，判断是含胸还是驼背
    const chestWidthChangeThreshold = 0.01;
    if (smoothD.sw < -chestWidthChangeThreshold) {
        lines.push({l:'warn', t:'两肩内收，注意含胸不是驼背，要保持胸背部圆撑。'});
    } else if (smoothD.sw > chestWidthChangeThreshold) {
        lines.push({l:'warn', t:'两肩外撑，可能挺胸了，请含住胸。'});
    }

    // ==================== 松腰敛臀 (更精准的判断) ====================
    // 优化：结合胯宽和膝角，判断是后翘还是前顶
    const hipWidthChangeThreshold = 0.01;
    if (smoothD.hw > hipWidthChangeThreshold && smoothD.sw < 0.005) {
        lines.push({l:'bad', t:'臀部后翘，敛臀应尾闾下扣，而非后翘。'});
    } else if (smoothD.hw < -hipWidthChangeThreshold) {
        lines.push({l:'warn', t:'臀部可能前顶，注意保持中正。'});
    }

    // ==================== 屈膝松胯 (更安全的判断) ====================
    // 优化：增加对膝角绝对值的检查，防止过度下蹲
    const kneeBendMin = 110; // 最小安全膝角
    const kneeBendMax = 160; // 最大安全膝角
    const kneeChangeThreshold = 5; // 膝角变化的警告阈值

    // 左膝
    if (smoothD.lk > kneeChangeThreshold && cur.lk > kneeBendMax) {
        lines.push({l:'bad', t:'左膝伸直趋势明显，太极无直腿，膝盖需保持微曲。'});
    } else if (smoothD.lk > kneeChangeThreshold) {
        lines.push({l:'warn', t:'左膝正在变直，注意保持屈膝。'});
    } else if (smoothD.lk < -kneeChangeThreshold && cur.lk < kneeBendMin) {
        lines.push({l:'bad', t:'左膝弯曲过度（' + cur.lk.toFixed(0) + '°），避免跪膝。'});
    } else if (smoothD.lk < -kneeChangeThreshold && cur.lk >= kneeBendMin && cur.lk <= kneeBendMax) {
        lines.push({l:'good', t:'左腿下蹲，屈膝松胯，注意膝盖方向对准脚尖。'});
    }

    // 右膝 (逻辑同左膝)
    if (smoothD.rk > kneeChangeThreshold && cur.rk > kneeBendMax) {
        lines.push({l:'bad', t:'右膝伸直趋势明显，太极无直腿，膝盖需保持微曲。'});
    } else if (smoothD.rk > kneeChangeThreshold) {
        lines.push({l:'warn', t:'右膝正在变直，注意保持屈膝。'});
    } else if (smoothD.rk < -kneeChangeThreshold && cur.rk < kneeBendMin) {
        lines.push({l:'bad', t:'右膝弯曲过度（' + cur.rk.toFixed(0) + '°），避免跪膝。'});
    } else if (smoothD.rk < -kneeChangeThreshold && cur.rk >= kneeBendMin && cur.rk <= kneeBendMax) {
        lines.push({l:'good', t:'右腿下蹲，屈膝松胯，注意膝盖方向对准脚尖。'});
    }

    // ==================== 虚实转换 (更流畅的判断) ====================
    // 优化：考虑重心的转移速度和稳定性
    const weightShiftThreshold = 8; // 重心转移的阈值
    const weightShiftStability = 0.5; // 重心稳定性的权重
    var curDiff = cur.lk - cur.rk;
    var prevDiff = (cur.lk - d.lk) - (cur.rk - d.rk);
    var diffChange = curDiff - prevDiff;

    if (Math.abs(diffChange) > weightShiftThreshold) {
        var to = diffChange > 0 ? '左' : '右';
        lines.push({l:'info', t:'重心正在向' + to + '腿转换——实腿要稳，虚腿要灵，避免双重。'});
    }

    // ==================== 上身中正 (更严格的判断) ====================
    const bodyLeanThreshold = 0.007;
    if (Math.abs(smoothD.lean) > bodyLeanThreshold) {
        var dir = smoothD.lean > 0 ? '右' : '左';
        lines.push({l:'warn', t:'上身向' + dir + '倾斜，太极要求中正安舒，请调整。'});
    }

    // ==================== 手臂运动轨迹判断 (更智能的识别) ====================
    // 优化：增加对动作连贯性的判断，比如云手时腰的转动
    // 1. 白鹤亮翅
    if (smoothD.rwy < -0.03 || smoothD.lwy < -0.03) {
        if (Math.abs(cur.lwy - cur.rwy) > 0.1) { // 高度差大
            lines.push({l:'info', t:'两手高低分明，像是白鹤亮翅，注意沉肩坐腕，力达掌根。'});
        }
    }
    // 2. 双手前推 (揽雀尾/按式)
    if (smoothD.lwx > 0.02 && smoothD.rwx > 0.02) {
        lines.push({l:'info', t:'双手前推，注意沉肩坠肘，力从脚起，主宰于腰。'});
    }
    // 3. 一手前一手后 (搂膝拗步)
    if ((smoothD.lwx > 0.025 && smoothD.rwx < -0.015) || (smoothD.rwx > 0.025 && smoothD.lwx < -0.015)) {
        lines.push({l:'info', t:'一手前推一手后捋，注意后手不要夹肋，前手肘微屈。'});
    }
    // 4. 云手
    if (Math.abs(cur.lwy - cur.rwy) < 0.05 && (Math.abs(smoothD.lwx) > 0.015 || Math.abs(smoothD.rwx) > 0.015)) {
        if (cur.lk < 165 && cur.rk < 165) {
            lines.push({l:'info', t:'两手水平移动，疑似云手，注意以腰为轴，手随腰转。'});
        }
    }

    // ==================== 静态评估 (更全面的检查) ====================
    if (lines.length === 0 &&
        Math.abs(smoothD.le) < 2 && Math.abs(smoothD.re) < 2 &&
        Math.abs(smoothD.lk) < 2 && Math.abs(smoothD.rk) < 2) {

        // 检查静态姿态的稳定性
        if (cur.le < 100 || cur.re < 100) {
            lines.push({l:'warn', t:'手臂夹得太紧，请打开，保持圆撑。'});
        }
        if (cur.lk > 168 && cur.rk > 168) {
            lines.push({l:'bad', t:'两腿站得太直，请微微屈膝，降低重心。'});
        }
        if ((cur.lk < kneeBendMin || cur.rk < kneeBendMin)) {
            lines.push({l:'warn', t:'膝盖弯曲过度，检查是否跪膝。'});
        }
        if (cur.le > 100 && cur.re > 100 && cur.lk >= kneeBendMin && cur.rk >= kneeBendMin) {
            lines.push({l:'good', t:'姿态稳定，肩松肘沉，屈膝松胯，保持住。'});
        }
        if (lines.length === 0) {
            lines.push({l:'info', t:'姿态良好，注意呼吸自然，气沉丹田。'});
        }
    }

    return lines;
}


// ===== UI =====
function handleUpload(e){
    var f=e.target.files[0];if(!f)return;
    document.getElementById('video').src=URL.createObjectURL(f);
    document.getElementById('resultBox').style.display='block';
    document.getElementById('playBtn').style.display='block';
    document.getElementById('reuploadBtn').style.display='block';
    document.getElementById('masterPanel').style.display='block';
    logBlocks=[];prev=null;pprev=null;lastLogTime=0;
    document.getElementById('masterLog').innerHTML='<div class="no-data">等待分析...</div>';
}
function resetAll(){
    isAnalyzing=false;prev=null;pprev=null;lastLogTime=0;logBlocks=[];
    var v=document.getElementById('video');v.pause();v.removeAttribute('src');
    document.getElementById('canvas').getContext('2d').clearRect(0,0,9999,9999);
    document.getElementById('playBtn').style.display='block';
    document.getElementById('playBtn').textContent='▶';
    document.getElementById('masterLog').innerHTML='<div class="no-data">等待分析...</div>';
    document.getElementById('fileInput').value='';
    document.getElementById('fileInput').click();
}
function startPlaying(){
    var v=document.getElementById('video'),b=document.getElementById('playBtn');
    if(isAnalyzing){v.pause();isAnalyzing=false;b.textContent='▶';return;}
    if(v.videoWidth&&v.videoHeight){var c=document.getElementById('canvas');c.width=v.videoWidth;c.height=v.videoHeight;}
    startTime=Date.now();
    v.play().then(function(){b.style.display='none';isAnalyzing=true;runLoop();});
}
function runLoop(){
    if(!isAnalyzing)return;
    var v=document.getElementById('video');
    if(v.paused||v.ended){isAnalyzing=false;document.getElementById('playBtn').style.display='block';return;}
    pose.send({image:v}).then(function(){requestAnimationFrame(runLoop);});
}

pose.onResults(function(res){
    var c=document.getElementById('canvas'),ctx=c.getContext('2d'),v=document.getElementById('video');
    ctx.drawImage(v,0,0,c.width,c.height);
    if(!res.poseLandmarks)return;
    var lm=res.poseLandmarks;

    // 画骨骼
    var conn=[[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],[23,25],[25,27],[24,26],[26,28]];
    ctx.strokeStyle='rgba(201,168,76,0.5)';ctx.lineWidth=3;
    conn.forEach(function(p){ctx.beginPath();ctx.moveTo(lm[p[0]].x*c.width,lm[p[0]].y*c.height);ctx.lineTo(lm[p[1]].x*c.width,lm[p[1]].y*c.height);ctx.stroke();});
    lm.forEach(function(p){ctx.beginPath();ctx.arc(p.x*c.width,p.y*c.height,4,0,Math.PI*2);ctx.fillStyle='rgba(201,168,76,0.8)';ctx.fill();});

    // 宗师思考
    var cur=snap(lm);
    if(prev && pprev){
        var d=delta(cur,prev);
        var dd=delta(prev,pprev);
        var now=Date.now();
        // 每1.5秒输出一次，避免刷屏
        if(now - lastLogTime > 1500){
            var lines=masterThink(cur,d,dd);
            if(lines.length > 0){
                lastLogTime=now;
                var sec=((now-startTime)/1000).toFixed(1);
                logBlocks.push({time:sec,lines:lines});
                // 最多保留20条
                if(logBlocks.length>20) logBlocks.shift();
                renderLog();
            }
        }
    }
    pprev=prev;
    prev=cur;
});

function renderLog(){
    var el=document.getElementById('masterLog');
    var h='';
    for(var i=logBlocks.length-1;i>=0;i--){
        var block=logBlocks[i];
        h+='<div class="log-block">';
        h+='<div class="log-time">第 '+block.time+' 秒</div>';
        h+='<div class="master-say">';
        block.lines.forEach(function(line){
            h+='<div class="line '+line.l+'">'+line.t+'</div>';
        });
        h+='</div></div>';
    }
    el.innerHTML=h;
}
        </script>
