<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

</head>
<body>
   <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">智能互动太极拳演练平台</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">主页</a></li>
                    <li class="nav-item"><a class="nav-link" href="ai01.html">AI互动</a></li>
                    <li class="nav-item"><a class="nav-link" href="taiji.html">太极门派</a></li>
                    <!-- <li class="nav-item"><a class="nav-link" href="guess.html">太极问答</a></li> -->
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <h3 class="mb-4 text-center">自我对照测试</h3>

        <div class="row mb-5">
            <div class="col-12 col-md-6 offset-md-2">
                <div class="card-body ratio ratio-16x9" id="uploadBox">
                    <p>请先上传您的演练视频</p>
                </div>
                <div class="mt-2">
                    <button class="btn w-100" onclick="document.getElementById('videoUpload').click()">
                        上传练习视频对照分析
                    </button>
                    <input type="file" id="videoUpload" accept="video/*" onchange="handleUpload(event)">
                </div>
            </div>
<style>
    #uploadBox {
        border: 2px solid #2563eb; /* 蓝色边框 */
        border-radius: 8px; /* 圆角 */
        padding: 20px; /* 内边距 */
        background-color: #f8f9fa; /* 浅灰色背景 */
        text-align: center;
        min-height: 200px; /* 最小高度 */
        display: flex;
        align-items: center;
        justify-content: center;
    }
</style>
            <!-- 视频选择器 -->
            <div class="col-md-6">
                <div class="mb-8">
                    <label class="form-label">点击下拉框选择要对比的太极视频：</label>
                    <select class="form-select" id="videoSelector">
                        <option value="right1">新编28式太极拳</option>
                        <option value="right2">杨式太极拳</option>
                        <option value="right3">武氏太极起势</option>
                        <option value="right4">吴式太极拳</option>
                        <option value="right5">孙式太极拳</option>
                        <option value="right6">陈式太极拳</option>
                        <option value="right7">张三丰传世太极13式</option>
                        <option value="right8">太极标准动作</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 标准视频参考区 -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">标准动作参考</h5>
                    </div>
                    <div class="card-body">
                        <div class="ratio ratio-16x9">
                            <video id="standardVideo" controls class="w-100">
                                <source src="asset/taijistandard1.mp4" type="video/mp4">
                                您的浏览器不支持视频播放。
                            </video>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
<footer class="bg-primary text-white text-center py-3 mt-5">
    <p>&copy; 2026-forever 我的太极世界. 保留所有权利.</p>
</footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // 上传视频处理
        function handleUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const uploadBox = document.getElementById('uploadBox');

            // 创建视频元素
            const videoElement = document.createElement('video');
            videoElement.style.width = '100%';
            videoElement.style.height = '100%';
            videoElement.style.objectFit = 'cover';
            videoElement.controls = true;

            // 清空上传框并添加视频
            uploadBox.innerHTML = '';
            uploadBox.appendChild(videoElement);

            // 设置视频源
            const videoUrl = URL.createObjectURL(file);
            videoElement.src = videoUrl;

            // 错误处理
            videoElement.onerror = (e) => {
                console.error('视频加载错误:', e);
                uploadBox.innerHTML = '<p class="text-danger">视频加载失败，请重试。</p>';
            };
        }

        // 视频数据配置
        const videoData = {
            right1: { videoSrc: 'asset/1.mp4' },
            right2: { videoSrc: 'asset/杨氏太极.mp4' },
            right3: { videoSrc: 'asset/武氏太极3.mp4' },
            right4: { videoSrc: 'asset/吴氏太极1.mp4' },
            right5: { videoSrc: 'asset/孙氏太极5.mp4' },
            right6: { videoSrc: 'asset/陈氏太极2.mp4' },
            right7: { videoSrc: 'asset/zhangsanfeng13converted.mp4' },
            right8: { videoSrc: 'asset/taijistandard1.mp4' }
        };

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            const videoSelector = document.getElementById('videoSelector');
            const standardVideo = document.getElementById('standardVideo');

            // 初始加载第一个视频
            const initialVideo = videoData[videoSelector.value];
            if (initialVideo) {
                standardVideo.querySelector('source').src = initialVideo.videoSrc;
                standardVideo.load();
            }

            // 视频选择器变化事件
            videoSelector.addEventListener('change', function() {
                const selectedVideo = videoData[this.value];
                if (selectedVideo) {
                    standardVideo.querySelector('source').src = selectedVideo.videoSrc;
                    standardVideo.load();
                }
            });
        });
    </script>
</body>
</html>
