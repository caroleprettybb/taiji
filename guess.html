<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太极问答- 我的太极世界</title>
    <link rel="stylesheet" href="bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">太极世界</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">主页</a></li>
                    <li class="nav-item"><a class="nav-link" href="ai01.html">AI互动</a></li>
                    <li class="nav-item"><a class="nav-link" href="taiji.html">太极门派</a></li>
                    <!-- <li class="nav-item"><a class="nav-link" href="guess.html">太极问答</a></li> -->
                </ul>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <div class="container mt-4">
        <h1 class="text-center mb-4">看看这些太极动作做对了吗？</h1>

        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <p class="card-text">这里有若干各流派有某些片段的视频或动作，请习练者判断并指出其错误所在。</p>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-8 offset-md-2">
                <div class="card">
                    <div class="card-header">动作正误判断</div>
                    <div class="card-body">
                        <p>观看以下视频，判断动作是否正确：</p>

                        <!-- 视频选择器 -->
                        <div class="mb-3">
                            <label class="form-label">选择要判断的视频：</label>
                            <select class="form-select" id="videoSelector">
                                <option value="error1">正误判断1</option>
                                <option value="error2">正误判断2</option>
                                <option value="error3">正误判断3</option>
                            </select>
                        </div>

                        <!-- 视频播放器 -->
                        <video controls class="w-100 mb-3" id="errorVideo">
                            <source src="assets/error1_1.mp4" type="video/mp4">
                            您的浏览器不支持视频播放。
                        </video>

                        <!-- 答案选择 -->
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="correctness" id="correct" value="correct">
                            <label class="form-check-label" for="correct">动作正确</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="correctness" id="incorrect" value="incorrect">
                            <label class="form-check-label" for="incorrect">动作错误</label>
                        </div>

                        <!-- 提交按钮 -->
                        <button class="btn btn-primary mt-2" id="checkAnswer">提交答案</button>
                        <div id="feedback" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p>&copy; 2024 我的太极世界. 保留所有权利.</p>
    </footer>

    <script src="bootstrap/bootstrap.bundle.min.js"></script>
    <script>
        // 视频数据配置
        const videoData = {
            error1: {
                videoSrc: 'asset/error1_1.mp4',
                feedbackPage: 'feedback_1.html'
            },
            error2: {
                videoSrc: 'asset/error2.mp4',
                feedbackPage: 'feedback_2.html'
            },
            error3: {
                videoSrc: 'asset/error3_1.mp4',
                feedbackPage: 'feedback_3.html'
            }
        };

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            const videoSelector = document.getElementById('videoSelector');
            const errorVideo = document.getElementById('errorVideo');

            // 视频选择器变化事件
            videoSelector.addEventListener('change', function() {
                const selectedVideo = videoData[this.value];
                if (selectedVideo) {
                    errorVideo.querySelector('source').src = selectedVideo.videoSrc;
                    errorVideo.load();
                }
            });

            // 答案检查
            document.getElementById('checkAnswer').addEventListener('click', () => {
                const selected = document.querySelector('input[name="correctness"]:checked');
                const videoSelector = document.getElementById('videoSelector');
                const feedback = document.getElementById('feedback');

                if (!selected) {
                    feedback.innerHTML = '<div class="alert alert-warning">请选择一个选项</div>';
                    return;
                }

                const selectedVideo = videoSelector.value;
                const videoInfo = videoData[selectedVideo];

                if (videoInfo) {
                    window.location.href = videoInfo.feedbackPage;
                } else {
                    feedback.innerHTML = '<div class="alert alert-warning">请选择一个视频</div>';
                }
            });
        });
    </script>
</body>
</html>
