<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太极问答- 我的太极世界</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
     integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">智能互动太极拳演练平台</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">主页</a></li>
                    <li class="nav-item"><a class="nav-link" href="ai01.html">AI互动</a></li>
                    <li class="nav-item"><a class="nav-link" href="taiji.html">太极门派</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <div class="container mt-4">
        <h1 class="text-center mb-4">看看这些太极动作做对了吗？</h1>

        <div class="row">
            <div class="col-12 col-md-8 offset-md-2">
                <div class="card">
                    <div class="card-body">
                        <p class="card-text">这里有若干各流派有某些片段的视频或动作，请习练者判断并指出其错误所在。</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12 col-md-8 offset-md-2">
                <div class="card">
                    <div class="text-center card-body">
                        <!-- 视频选择器 -->
                        <div class="mb-3">
                            <label class="form-label">点击下拉框选择要判断的视频：</label>
                            <select class="form-select" id="videoSelector">
                                <option value="error1">正误判断1</option>
                                <option value="error2">正误判断2</option>
                                <option value="error3">正误判断3</option>
                                <option value="correct1">正误判断4</option>
                                <option value="correct2">正误判断5</option>
                                <option value="correct3">正误判断6</option>
                            </select>
                        </div>

                        <!-- 视频播放器 -->
                        <video controls class="w-100 mb-3" id="videoPlayer">
                            <source src="asset/error1_1.mp4" type="video/mp4">
                            您的浏览器不支持视频播放。
                        </video>

                       <!-- 答案选择 -->
<div class="form-check mb-2">
    <input class="form-check-input" type="radio" name="correctness" id="correct" value="correct">
    <label class="form-check-label" for="correct">动作正确</label>
</div>
<div class="form-check mb-2">
    <input class="form-check-input" type="radio" name="correctness" id="incorrect" value="incorrect">
    <label class="form-check-label" for="incorrect">动作错误</label>
</div>


                        <!-- 提交按钮 -->
                        <button class="btn btn-outline-primary mt-2" id="checkAnswer">提交答案</button>
                        <div id="feedback" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="bg-primary text-white text-center py-3 mt-5">
        <p>&copy; 2026-forever 我的太极世界. 保留所有权利.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const videoSelector = document.getElementById('videoSelector');
        const videoPlayer = document.getElementById('videoPlayer');
        const checkAnswerBtn = document.getElementById('checkAnswer');
        const feedback = document.getElementById('feedback');

        // 视频数据配置
        const allVideoData = {
            error1: { videoSrc: 'asset/error1_1.mp4', type: 'error', feedbackPage: 'feedback_1.html' },
            error2: { videoSrc: 'asset/error2.mp4', type: 'error', feedbackPage: 'feedback_2.html' },
            error3: { videoSrc: 'asset/error3_1.mp4', type: 'error', feedbackPage: 'feedback_3.html' },
            correct1: { videoSrc: 'asset/correct1.mp4', type: 'correct' },
            correct2: { videoSrc: 'asset/correct2.mp4', type: 'correct' },
            correct3: { videoSrc: 'asset/correct3.mp4', type: 'correct' }
        };

        // 初始加载第一个视频
        const initialVideo = allVideoData[videoSelector.value];
        if (initialVideo) {
            videoPlayer.querySelector('source').src = initialVideo.videoSrc;
            videoPlayer.load();
        }

        // 视频切换事件
        videoSelector.addEventListener('change', function() {
            feedback.innerHTML = ''; // 切换视频时清掉上一次的提示
            const videoInfo = allVideoData[this.value];
            if (videoInfo) {
                videoPlayer.querySelector('source').src = videoInfo.videoSrc;
                videoPlayer.load();
            }
        });

        // 提交答案事件
        checkAnswerBtn.addEventListener('click', () => {
            const selectedRadio = document.querySelector('input[name="correctness"]:checked');
            const videoInfo = allVideoData[videoSelector.value];

            if (!selectedRadio) {
                feedback.innerHTML = '<div class="alert alert-warning">请先选择一个选项！</div>';
                return;
            }

            const userAnswer = selectedRadio.value;

            if (videoInfo.type === 'error') {
                // 1. 错误视频：无论选什么，直接跳转
                window.location.href = videoInfo.feedbackPage;

            } else if (videoInfo.type === 'correct') {
                // 2. 正确视频：不跳转，只看选对选错给提示
                if (userAnswer === 'correct') {
                    feedback.innerHTML = '<div class="alert alert-success">恭喜你，答对了！</div>';
                } else {
                    feedback.innerHTML = '<div class="alert alert-danger">回答错误，这是正确的视频。</div>';
                }
            }
        });
    });
</script>
</body>
</html>
