<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太极功夫</title>
    <!-- 引入 Bootstrap 5 的 CSS (样式) -->
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <!-- 2. 然后加载你的自定义CSS（这样你的样式会覆盖Bootstrap的默认样式） -->
     <link href="styles.css" rel="stylesheet">
    <style>
        /* ==========================================
           这里是你要求的：只添加背景图的 CSS
           ========================================== */
        body {
            /* 把你的背景图设置在 body 上，这样整个网页底层都是这张图 */
            background-image: url('asset/bg2.jpg');
            background-size: cover;      /* 强制图片铺满窗口，不会只露出一半 */
            background-position: center; /* 图片居中对齐 */
            background-attachment: fixed;/* 滚动页面时，背景图固定不动（高级感） */
            background-repeat: no-repeat;/* 不让图片平铺重复 */
        }
    </style>
</head>
<body>


    <!-- ============================================== -->
    <!-- 第一部分：网站名称 (Bootstrap 导航栏) -->
    <!-- ============================================== -->
    <nav class="navbar navbar-light bg-light mb-3">
        <div class="container">
            <a class="navbar-brand fs-3 fw-bold" href="index.html">智能互动太极拳演练平台</a>
        </div>
    </nav>


    <!-- ============================================== -->
    <!-- 第二部分：主体轮播 (图片与视频混合) -->
    <!-- ============================================== -->

    <div class="container">

        <div id="mainCarousel" class="carousel slide" data-bs-ride="carousel">

                 <!-- 视频自动播放-->
            <div class="carousel-inner">
                 <div class="carousel-item active">
                   <div class="video-container">
                      <video class="d-block w-100" controls autoplay loop muted  muted playsinline style="max-height: 500px; object-fit: cover;">
                      <source src="asset/slides.mp4" type="video/mp4">
                     <!-- <source src="your-video.webm" type="video/webm"> -->
                      您的浏览器不支持视频播放
                     </video>
                  </div>
            </div>



                <!-- 第 1张：视频 (注意：这里的视频没有controls，作为背景轮播；如果需要能控制，加上 controls 属性即可)

                <div class="carousel-item">
                    <video class="d-block w-100" muted loop style="max-height: 500px; object-fit: cover;">
                        <source src="asset/slides.mp4" type="video/mp4">
                    </video>
                </div>  -->


                 <!-- 第 2 张：普通图片
                <div class="carousel-item active">
                    <img src="asset/slides05.jpg" class="d-block w-100" alt="太极展示1" style="max-height: 500px; object-fit: cover;">
                </div> -->

            <!-- 左右切换按钮
            <button class="carousel-control-prev" type="button" data-bs-target="#mainCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#mainCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button> -->
        </div>


        <!-- ============================================== -->
        <!-- 第三部分：三个页面的缩略图卡片 (横向排列) -->
        <!-- ============================================== -->
        <!-- row: 开启一行
             mt-4: 距离上方有一点间距
             g-4: 卡片之间的间隙 -->
        <div class="row mt-4 g-4 justify-content-center">

            <!-- col-md-4: 在电脑上占三分之一（并排3个），在手机上自动占满整行（竖排） -->
            <div class="col-12 col-md-4">
                <a href="taiji.html" class="text-decoration-none text-dark">
                    <div class="card h-100">
                        <!-- 缩略图 -->
                        <img src="asset/pagecards0101.jpg" class="card-img-top" alt="页面1">
                        <div class="card-body text-center">
                            <!-- <h5 class="card-title">太极门派</h5> -->
                        </div>
                    </div>
                </a>
            </div>

            <div class="col-12 col-md-4">
                <a href="ai01.html" class="text-decoration-none text-dark">
                    <div class="card h-100">
                        <img src="asset/pagecards02.jpg" class="card-img-top" alt="页面2">
                        <div class="card-body text-center">
                            <h5 class="card-title">AI智能互动测试</h5>
                        </div>
                    </div>
                </a>
            </div>

           <!-- <div class="col-12 col-md-4">
                <a href="history.html" class="text-decoration-none text-dark">
                    <div class="card h-100">
                        <img src="asset/pagecards03.jpg" class="card-img-top" alt="页面3">
                        <div class="card-body text-center">
                            <h5 class="card-title">太极历史</h5>
                        </div>
                    </div>
                </a>
            </div>-->

        </div>
    </div>


    <!-- 引入 Bootstrap 5 的 JS (用于轮播图的自动播放和左右切换) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
    <!-- 监听视频播放再轮播 -->
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    const video = document.querySelector('video');
    const carousel = document.querySelector('.carousel');

    video.addEventListener('ended', function() {
      const nextButton = carousel.querySelector('.carousel-control-next');
      if (nextButton) {
        nextButton.click();
      }
    });
  });
  </script>
</body>
</html>
