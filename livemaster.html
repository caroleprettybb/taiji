        <script>
// ====== 1. MediaPipe Pose 初始化 ======
var pose = new Pose({
    locateFile: function(f){return 'https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5.1675469404/'+f}
});
pose.setOptions({
    modelComplexity: 1, // 使用复杂度1的模型，平衡精度与速度
    smoothLandmarks: true, // 平滑关键点，减少抖动
    minDetectionConfidence: 0.5, // 最小检测置信度
    minTrackingConfidence: 0.5 // 最小追踪置信度
});

// ====== 2. 全局状态变量 ======
var stream = null; // 存储摄像头媒体流
var animationFrameId = null; // 存储requestAnimationFrame ID
var isAnalyzing = false; // 是否正在分析
var startTime = 0; // 分析开始时间
var prev = null; // 上一帧骨骼快照
var pprev = null; // 上上帧骨骼快照
var lastLogTime = 0; // 上次输出日志时间
var logBlocks = []; // 存储历史分析记录

// ====== 3. 核心骨骼计算函数 (来自“宗师”代码) ======
// 计算三个点构成的角度
function ang(a,b,c){
    var r=Math.atan2(c.y-b.y,c.x-b.x)-Math.atan2(a.y-b.y,a.x-b.x);
    var d=Math.abs(r*180/Math.PI);
    return d>180?360-d:d;
}

// 提取当前帧的关键骨骼角度和位置信息
function snap(lm){
    return {
        le:ang(lm[11],lm[13],lm[15]), // 左肘角
        re:ang(lm[12],lm[14],lm[16]), // 右肘角
        ls:ang(lm[13],lm[11],lm[23]), // 左肩角
        rs:ang(lm[14],lm[12],lm[24]), // 右肩角
        lk:ang(lm[23],lm[25],lm[27]), // 左膝角
        rk:ang(lm[24],lm[26],lm[28]), // 右膝角
        lh:ang(lm[11],lm[23],lm[25]), // 左髋角
        rh:ang(lm[12],lm[24],lm[26]), // 右髋角
        lwy:lm[15].y-lm[11].y, // 左手腕相对左肩的垂直偏移
        rwy:lm[16].y-lm[12].y, // 右手腕相对右肩的垂直偏移
        lwx:lm[15].x-lm[11].x, // 左手腕相对左肩的水平偏移
        rwx:lm[12].x-lm[16].x, // 右手腕相对右肩的水平偏移
        led:lm[13].y-lm[11].y, // 左肘相对左肩的垂直偏移
        red:lm[14].y-lm[12].y, // 右肘相对右肩的垂直偏移
        nose:lm[0].x-(lm[11].x+lm[12].x)/2, // 头部相对肩中线的偏移
        lean:(lm[11].x+lm[12].x)/2-(lm[23].x+lm[24].x)/2, // 上身偏移
        sw:Math.abs(lm[11].x-lm[12].x), // 肩宽
        hw:Math.abs(lm[23].x-lm[24].x) // 胯宽
    };
}

// 计算两个快照之间的变化量
function delta(a,b){ var d={}; for(var k in a) d[k]=a[k]-b[k]; return d; }

// ====== 4. “宗师”的完整推理引擎 (保持不变) ======
function masterThink(cur, d, dd) {
    var lines = [];
    // ... (此处完全保留您提供的 masterThink 函数内部所有逻辑) ...
    // 推理：肘角变小=屈臂，此时肘应下沉；肘角变大=伸臂，肘不应上抬
    if(d.le < -4 && d.led >= 0)
        lines.push({l:'warn',t:'左手屈臂时肘没有沉下去，沉肩坠肘不是光弯胳膊，肘要往下走'});
    else if(d.le > 4 && d.red > 0.01)
        lines.push({l:'warn',t:'左手伸臂时肘跟着往上跑了，肩在耸，松开它'});
    // ... (其他所有条件判断) ...
    else if (d.led > 0.015 && Math.abs(d.le) < 4)
        lines.push({ l: 'bad', t: '左手肘在往上冒，耸肩了，马上松下来' });
    else if (d.led < -0.015 && Math.abs(d.le) < 4)
        lines.push({ l: 'good', t: '左手肩在松沉，肘在下走，这个感觉对了' });

    if (d.re < -4 && d.red >= 0)
        lines.push({ l: 'warn', t: '右手屈臂肘没沉，坠肘是肘尖朝下，不是朝后朝外' });
    else if (d.re > 4 && d.red > 0.01)
        lines.push({ l: 'warn', t: '右手伸臂肘上抬了，肩紧了' });
    else if (d.red > 0.015 && Math.abs(d.re) < 4)
        lines.push({ l: 'bad', t: '右手肘在往上冒，耸肩，松' });
    else if (d.red < -0.015 && Math.abs(d.re) < 4)
        lines.push({ l: 'good', t: '右手肩松肘沉，保持' });

    // ==== 虚领顶劲 ====
    if (Math.abs(d.nose) > 0.004) {
        if (d.nose > 0) lines.push({ l: 'warn', t: '头跟着身体歪了，虚领顶劲是头顶百会穴往上拎，不管身体怎么转头要正' });
        else lines.push({ l: 'good', t: '头在回正，百会穴上领的感觉有了' });
    }

    // ==== 含胸拔背 ====
    // 推理：肩宽突然变窄=含胸过度；变宽=可能挺胸或耸肩
    if (d.sw < -0.008) lines.push({ l: 'warn', t: '两肩在往里收，含胸不是驼背，胸要含住但背要拔圆' });
    if (d.sw > 0.012) lines.push({ l: 'warn', t: '两肩在往外撑，可能挺胸了，含住它' });

    // ==== 松腰敛臀 ====
    // 推理：胯宽相对肩宽突然变大=臀后翘
    var curRatio = cur.hw / Math.max(cur.sw, 0.01);
    if (d.hw > 0.008 && d.sw < 0.003)
        lines.push({ l: 'bad', t: '胯在往外撑，臀部后翘了，敛臀——尾闾往下扣，不是往后翘' });

    // ==== 屈膝松胯 ====
    // 推理：膝角变大=腿在伸直，太极任何时候腿都不能完全伸直
    if (d.lk > 6 && cur.lk > 160)
        lines.push({ l: 'bad', t: '左腿在伸直（' + cur.lk.toFixed(0) + '°），太极没有直腿的时候，膝盖永远微曲' });
    else if (d.lk > 4)
        lines.push({ l: 'warn', t: '左膝在变直，注意保持曲度' });
    else if (d.lk < -6 && cur.lk < 110)
        lines.push({ l: 'bad', t: '左膝弯曲过度（' + cur.lk.toFixed(0) + '°），不要跪膝，膝盖不能超过脚尖' });
    else if (d.lk < -4 && cur.lk >= 110 && cur.lk <= 155)
        lines.push({ l: 'good', t: '左腿在下蹲，屈膝松胯，注意膝盖方向对准脚尖' });

    if (d.rk > 6 && cur.rk > 160)
        lines.push({ l: 'bad', t: '右腿伸直了（' + cur.rk.toFixed(0) + '°），不能直腿' });
    else if (d.rk > 4)
        lines.push({ l: 'warn', t: '右膝在变直' });
    else if (d.rk < -6 && cur.rk < 110)
        lines.push({ l: 'bad', t: '右膝弯太多了（' + cur.rk.toFixed(0) + '°），别跪膝' });
    else if (d.rk < -4 && cur.rk >= 110 && cur.rk <= 155)
        lines.push({ l: 'good', t: '右腿下蹲中，松胯到位' });

    // ==== 虚实转换 ====
    // 推理：左右膝角差值在变化=重心在转移
    var curDiff = cur.lk - cur.rk;
    var prevDiff = (cur.lk - d.lk) - (cur.rk - d.rk);
    var diffChange = curDiff - prevDiff;
    if (Math.abs(diffChange) > 6) {
        var to = diffChange > 0 ? '左' : '右';
        lines.push({ l: 'info', t: '重心正在向' + to + '腿转换——实腿要稳，虚腿要灵，虚腿不能死死踩在地上' });
    }

    // ==== 上身中正 ====
    if (Math.abs(d.lean) > 0.006) {
        var dir = d.lean > 0 ? '右' : '左';
        lines.push({ l: 'info', t: '右手在上左手在下，像是白鹤亮翅的动作，注意右手上举时肩不要耸，左手下按时要坐腕' });
        else lines.push({ l: 'warn', t: '右手在上举，但左手没有配合下按，两手要有对拉劲' });
    }
    if (d.lwy < -0.025) {
        if (cur.rwy > 0.03) lines.push({ l: 'info', t: '左手在上右手在下，注意沉肩坐腕' });
        else lines.push({ l: 'warn', t: '左手上举时右手没有配合，两手要有呼应' });
    }

    // 推理：双手同时前伸=可能是揽雀尾/按式
    if (d.lwx > 0.015 && d.rwx > 0.015)
        lines.push({ l: 'info', t: '双手同时前推，注意沉肩坠肘不能架起来，力从脚起传到腰再传到手，不要光用手推' });

    // 推理：一手前推一手在后=搂膝拗步
    if ((d.lwx > 0.02 && d.rwx < -0.01) || (d.rwx > 0.02 && d.lwx < -0.01))
        lines.push({ l: 'info', t: '一手前一手后，注意后手不要夹在肋上，要拉开，前手肘不能伸直' });

    // 推理：双手高度接近且在移动=云手
    if (Math.abs(cur.lwy - cur.rwy) < 0.05 && (Math.abs(d.lwx) > 0.01 || Math.abs(d.rwx) > 0.01)) {
        if (cur.lk < 165 && cur.rk < 165)
            lines.push({ l: 'info', t: '两手在水平方向移动，像云手，注意腰为主宰手随腰转，不要光动手不转腰' });
    }

    // ==== 坐腕沉指 ====
    // 推理：手腕角度（手腕-中指根-中指尖）太直=没坐腕
    var lwa = 0, rwa = 0; // 需要额外算
    // 简化：看手腕y和肘y的关系，如果手腕比肘高很多但手指没信息就跳过

    // ==== 如果没有任何明显变化=静止状态，做静态评估 ====
    if(lines.length === 0 && Math.abs(d.le) < 2 && Math.abs(d.re) < 2 && Math.abs(d.lk) < 2 && Math.abs(d.rk) < 2){
        // ... (静态评估逻辑) ...
         if (cur.le < 100) lines.push({ l: 'warn', t: '左手肘夹得太紧（' + cur.le.toFixed(0) + '°），打开些，手臂要有圆撑感' });
        if (cur.re < 100) lines.push({ l: 'warn', t: '右手肘夹得太紧（' + cur.re.toFixed(0) + '°），圆裆圆臂' });
        if (cur.lk > 168 && cur.rk > 168) lines.push({ l: 'bad', t: '两腿都太直了，太极没有站直的时候，微微屈膝重心降低' });
        if (cur.lk < 110) lines.push({ l: 'warn', t: '左膝弯曲过度（' + cur.lk.toFixed(0) + '°），检查是否跪膝' });
        if (cur.rk < 110) lines.push({ l: 'warn', t: '右膝弯曲过度（' + cur.rk.toFixed(0) + '°），检查是否跪膝' });
        if (cur.le > 100 && cur.re > 100 && cur.lk < 165 && cur.rk < 165 && cur.led > 0 && cur.red > 0)
            lines.push({ l: 'good', t: '这个姿态不错，肩松肘沉，屈膝松胯，保持住' });
        if (lines.length === 0)
            lines.push({ l: 'info', t: '保持当前姿态，注意呼吸自然，气沉丹田' });
    }
    return lines;
}

// ====== 5. 摄像头控制与分析循环 ======
function startWebcam() {
    const video = document.getElementById('webcamVideo');
    const placeholder = document.getElementById('camPlaceholder');
    const workspace = document.getElementById('workspace');
    const startBtn = document.getElementById('startCamBtn');
    const stopBtn = document.getElementById('stopCamBtn');

    navigator.mediaDevices.getUserMedia({ video: true })
        .then(function(mediaStream) {
            stream = mediaStream;
            video.srcObject = mediaStream;
            workspace.style.display = 'block';
            placeholder.style.display = 'none';
            startBtn.style.display = 'none';
            stopBtn.style.display = 'inline-block';
            startTime = Date.now();
            isAnalyzing = true;
            logBlocks = [];
            prev = null; pprev = null;
            document.getElementById('masterLog').innerHTML = '<p class="text-center text-muted">系统已连接，正在实时追踪...请开始打太极</p>';

            // 核心改动：直接将视频流发送给MediaPipe Pose进行实时分析
            pose.send({image: video}).then(function() {
                requestAnimationFrame(realTimeAnalysisLoop);
            }).catch(function(err) {
                console.error('MediaPipe初始化错误:', err);
                document.getElementById('masterLog').innerHTML = `<p class="text-danger">分析引擎启动失败: ${err.message}</p>`;
            });

        })
        .catch(function(error) {
            placeholder.innerText = "无法访问摄像头，请检查浏览器权限设置";
            placeholder.style.color = "#dc2626";
            placeholder.style.display = 'block';
            startBtn.style.display = 'inline-block';
        });
}

// 实时分析循环
function realTimeAnalysisLoop() {
    if (!isAnalyzing) return;
    const video = document.getElementById('webcamVideo');
    const canvas = document.getElementById('skeletonCanvas');
    const ctx = canvas.getContext('2d');

    // 确保canvas尺寸与视频匹配
    if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
    }

    // 持续将视频帧发送给MediaPipe
    pose.send({image: video}).then(function(results) {
        // 清除画布
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (!results.poseLandmarks) {
            requestAnimationFrame(realTimeAnalysisLoop);
            return;
        }

        var lm = results.poseLandmarks;

        // 1. 绘制骨骼（复用“宗师”代码的绘制逻辑）
        var conn=[[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],[23,25],[25,27],[24,26],[26,28]];
        ctx.strokeStyle='rgba(201,168,76,0.6)';
        ctx.lineWidth=3;
        conn.forEach(function(p){
            ctx.beginPath();
            ctx.moveTo(lm[p[0]].x*canvas.width, lm[p[0]].y*canvas.height);
            ctx.lineTo(lm[p[1]].x*canvas.width, lm[p[1]].y*canvas.height);
            ctx.stroke();
        });
        // 绘制关节点
        lm.forEach(function(p){
            ctx.beginPath();
            ctx.arc(p.x*canvas.width, p.y*canvas.height, 5, 0, Math.PI*2);
            ctx.fillStyle='rgba(201,168,76,0.9)';
            ctx.fill();
        });

        // 2. 提取骨骼快照并进行“宗师”分析
        var cur = snap(lm);
        if (prev && pprev) {
            var d = delta(cur, prev);
            var dd = delta(prev, pprev);
            var now = Date.now();

            // 每1.5秒输出一次分析结果
            if (now - lastLogTime > 1500) {
                var lines = masterThink(cur, d, dd);
                if (lines.length > 0) {
                    lastLogTime = now;
                    var sec = ((now - startTime)/1000).toFixed(1);
                    logBlocks.push({time: sec, lines: lines});
                    if (logBlocks.length > 20) logBlocks.shift(); // 保留最近20条
                    renderLog();
                }
            }
        }

        // 更新历史帧
        pprev = prev;
        prev = cur;

        // 继续循环
        animationFrameId = requestAnimationFrame(realTimeAnalysisLoop);
    });
}

function stopWebcam() {
    if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
    }
    if (animationFrameId) {
        cancelAnimationFrame(animationFrameId);
        animationFrameId = null;
    }
    isAnalyzing = false;

    const video = document.getElementById('webcamVideo');
    const canvas = document.getElementById('skeletonCanvas');
    const workspace = document.getElementById('workspace');
    const placeholder = document.getElementById('camPlaceholder');
    const startBtn = document.getElementById('startCamBtn');
    const stopBtn = document.getElementById('stopCamBtn');

    video.srcObject = null;
    workspace.style.display = 'none';
    placeholder.style.display = 'block';
    placeholder.innerText = '摄像头已停止';
    startBtn.style.display = 'inline-block';
    stopBtn.style.display = 'none';
}

function clearLog() {
    logBlocks = [];
    document.getElementById('masterLog').innerHTML = '<p class="text-center text-muted">记录已清除</p>';
}

// ====== 6. 日志渲染函数 ======
function renderLog() {
    var el = document.getElementById('masterLog');
    var h = '';
    // 倒序显示，最新记录在上
    for (var i = logBlocks.length - 1; i >= 0; i--) {
        var block = logBlocks[i];
        h += '<div class="log-block">';
        h += '<div class="log-time">第 ' + block.time + ' 秒</div>';
        h += '<div class="master-say">';
        block.lines.forEach(function(line){
            h += '<div class="line ' + line.l + '">' + line.t + '</div>';
        });
        h += '</div></div>';
    }
    el.innerHTML = h;
}
