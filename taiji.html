<script>
function playVideo(btn) {
  // 获取视频路径
  const videoPath = btn.getAttribute('data-video');
  // 创建视频元素（如果不存在）
  let video = document.getElementById('myVideo');
  if (!video) {
    video = document.createElement('video');
    video.id = 'myVideo';
    video.controls = true;
    document.body.appendChild(video);
  }
  // 设置视频源并播放
  video.src = videoPath;
  video.play();
}
</script>
